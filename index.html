<script>
const noBtn = document.getElementById("noBtn");

noBtn.style.left = "55%";
noBtn.style.top = "55%";

document.addEventListener("mousemove", function(event) {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const rect = noBtn.getBoundingClientRect();

    const distance = Math.sqrt(
        Math.pow(event.clientX - (rect.left + rect.width / 2), 2) +
        Math.pow(event.clientY - (rect.top + rect.height / 2), 2)
    );

    if (distance < 120) {
        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
    }
});

document.getElementById("yesBtn").addEventListener("click", function() {

    document.querySelector("p").innerHTML = `
        <h2>❤️ Yay! Pick a date for our date ❤️</h2>
        <input type="date" id="datePicker" style="
            padding:10px;
            font-size:18px;
            border-radius:10px;
            border:2px solid pink;
        ">
        <br><br>
        <button onclick="confirmDate()" style="
            padding:10px 25px;
            font-size:18px;
            background:#ff4d6d;
            color:white;
            border:none;
            border-radius:20px;
        ">
            Confirm ❤️
        </button>
    `;

    document.getElementById("yesBtn").style.display = "none";
    document.getElementById("noBtn").style.display = "none";
});

function confirmDate() {
    const date = document.getElementById("datePicker").value;

    if (!date) {
        alert("Please choose a date ❤️");
        return;
    }

    document.querySelector("p").innerHTML = `
        <h2>🎉 It's a date! 🎉</h2>
        <p>I'm looking forward to seeing you on <b>${date}</b> ❤️🌹</p>
    `;
}
</script>
